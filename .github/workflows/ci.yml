name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, windows-2022, ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...

  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: install ruff
        run: pip install ruff
      - name: lint worker
        run: ruff check worker/
